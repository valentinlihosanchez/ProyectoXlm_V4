<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT CFDI Processor</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{margin:0!important;padding:0!important;width:100%;height:100%}
body{margin:0!important;padding:0!important;width:100%;height:100%;overflow:hidden}
.lpanel{margin-top:0;padding-left:0;padding-right:0}
:root{
  --bg:#eef0f4; --card:#fff; --raised:#f4f6f9;
  --b1:#dde1e8; --b2:#c8cdd6;
  --t1:#1a1d23; --t2:#5a6272; --t3:#9aa0ad;
  --green:#16a34a; --red:#dc2626; --blue:#2563eb; --amber:#d97706;
  /* ── Tokens HomePage ── */
  --hp-bg:#fafafa; --hp-t1:#0f172a; --hp-t2:#475569; --hp-t3:#94a3b8;
  --hp-b:#e2e8f0; --hp-raised:#f8fafc;
  --hp-green-bg:#f0fdf4; --hp-green-bd:#bbf7d0; --hp-green-text:#15803d;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--t1);font-size:13px}
input,button,select{font-family:'Inter',sans-serif}
input:focus:not(:focus-visible),button:focus:not(:focus-visible),select:focus:not(:focus-visible){outline:none}
input:focus-visible,button:focus-visible,select:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:3px}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
/* ── Responsive grids ── */
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.cfg-outer{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;align-items:start;margin-bottom:14px}
/* ── Mobile ── */
@media(max-width:720px){
  body{font-size:12px}
  .layout{flex-direction:column!important;padding:10px!important}
  .lpanel{width:100%!important;margin-right:0!important;height:auto!important;border-right:none!important;border-bottom:1px solid var(--b1)!important;border-radius:0!important;box-shadow:none!important;position:static!important;opacity:1!important}
  .lpanel.closed{width:100%!important;height:0!important;padding:0!important;overflow:hidden;opacity:0!important;pointer-events:none}
  .ppill{writing-mode:horizontal-tb!important;width:100%!important;flex-direction:row!important;min-width:unset!important;border-radius:7px!important;margin-right:0!important;margin-bottom:10px;position:static!important;padding:8px 14px!important;height:auto!important}
  .rpanel{width:100%!important}
  .cfg-grid{grid-template-columns:1fr!important}
  .cfg-outer{grid-template-columns:1fr!important}
  .xl-scroll{max-height:55vh}
  .inv-bar{flex-direction:column;align-items:stretch!important}
  .inv-bar select,.inv-bar .btn{width:100%!important;box-sizing:border-box}
}
@media(max-width:480px){
  .layout{padding:7px!important}
  .card{border-radius:8px}
  .drop-zone{min-height:140px!important;padding:16px!important}
}
.card{background:var(--card);border:1px solid var(--b1);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.raised{background:var(--raised);border:1px solid var(--b1);border-radius:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--b2);background:var(--card);color:var(--t1)}
.btn:hover{background:var(--raised)}
.btn-p{background:#1a1d23;color:#fff;border-color:#1a1d23}.btn-p:hover{background:#2d3240}
.btn-d{color:var(--red);border-color:rgba(220,38,38,.2)}.btn-d:hover{background:rgba(220,38,38,.05)}
.btn-act{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.btn-green{background:#16a34a;color:#fff;border-color:#16a34a}.btn-green:hover{background:#15803d}
.tog-track{width:32px;height:18px;border-radius:9px;padding:2px;display:flex;align-items:center;transition:background .2s;cursor:pointer;flex-shrink:0}
.tog-thumb{width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.drop-zone{border:2px dashed var(--b2);border-radius:10px;transition:all .2s;min-height:185px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;background:var(--card)}
.drop-zone.over{border-color:#2563eb;border-style:solid;background:rgba(37,99,235,.04)}
.sidebar-left{position:fixed;left:0;top:54px;bottom:0;width:258px;background:var(--card);border-right:1px solid var(--b1);z-index:50;display:flex;flex-direction:column;overflow:hidden}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0 12px}
.sb-bottom{flex-shrink:0;border-top:1px solid var(--b1)}
.sb-section{border-bottom:1px solid var(--b1)}
.sb-section:last-child{border-bottom:none}
.sb-section-header{display:flex;align-items:center;gap:7px;padding:10px 14px;cursor:pointer;user-select:none;color:var(--t2);font-size:11px;font-weight:650;letter-spacing:.055em;text-transform:uppercase;transition:color .15s}
.sb-section-header:hover{color:var(--t1)}
.sb-sec-icon{flex-shrink:0;opacity:.65}
.sb-sec-title{flex:1}
.sb-badge{font-size:10px;font-weight:600;background:rgba(22,163,74,.22);color:var(--green);border-radius:10px;padding:1px 6px;letter-spacing:0;text-transform:none}
.sb-chevron{color:var(--t3);transition:transform .22s ease-out;flex-shrink:0}
.sb-section.sb-collapsed .sb-chevron{transform:rotate(-90deg)}
.sb-chevron.open{transform:rotate(180deg)}
.sb-section-body{display:grid;grid-template-rows:1fr;transition:grid-template-rows .25s ease-out}
.sb-section.sb-collapsed .sb-section-body{grid-template-rows:0fr}
.sb-section-inner{overflow:hidden;min-height:0;padding:2px 10px 14px}
.sbd-wrap{flex-shrink:0;border-top:1px solid var(--b1)}
.sbd-section{border-bottom:1px solid var(--b1)}
.sbd-section:last-child{border-bottom:none}
.sbd-header{display:flex;align-items:center;gap:7px;padding:10px 14px;cursor:pointer;user-select:none;color:var(--t2);font-size:11px;font-weight:650;letter-spacing:.055em;text-transform:uppercase;transition:color .15s}
.sbd-header:hover{color:var(--t1)}
.sbd-icon{flex-shrink:0;opacity:.65}
.sbd-title{flex:1}
.sbd-badge{font-size:10px;font-weight:600;background:rgba(22,163,74,.22);color:var(--green);border-radius:10px;padding:1px 6px;letter-spacing:0;text-transform:none}
.sbd-chev{color:var(--t3);flex-shrink:0;transition:transform .22s ease-out}
.sbd-section.sbd-open .sbd-chev{transform:rotate(180deg)}
.sbd-body{overflow:hidden;max-height:0;transition:max-height .3s ease-out}
.sbd-section.sbd-open .sbd-body{max-height:500px}
.sbd-inner{padding:4px 10px 12px}
.sb-drop-zone{border:1.5px dashed var(--b2);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center}
.sb-drop-zone:hover,.sb-drop-zone.sb-dragover{border-color:var(--green);background:rgba(22,163,74,.11)}
.sb-drop-zone.sb-dragover{border-style:solid}
.sb-drop-icon{color:var(--t3);transition:color .15s;margin-bottom:2px}
.sb-drop-zone:hover .sb-drop-icon,.sb-drop-zone.sb-dragover .sb-drop-icon{color:var(--green)}
.sb-drop-label{font-size:12px;color:var(--t2);line-height:1.45}
.sb-drop-label strong{color:var(--t1);font-weight:550;display:block;margin-bottom:2px}
.sb-drop-formats{font-size:10px;color:var(--t3);letter-spacing:.03em}
.sb-file-btns{display:flex;gap:5px;margin-top:6px}
.sb-file-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 4px;background:var(--raised);border:1px solid var(--b1);border-radius:7px;color:var(--t2);font-size:11px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;transition:background .12s,border-color .12s,color .12s}
.sb-file-btn:hover{background:var(--card);border-color:var(--b2);color:var(--t1)}
.sb-file-tree{margin-top:10px;display:flex;flex-direction:column}
.sb-tree-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:5px;cursor:default;user-select:none;white-space:nowrap;overflow:hidden}
.sb-tree-row:hover{background:var(--raised)}
@keyframes sb-glow{0%,100%{background:rgba(22,163,74,.08)}50%{background:rgba(22,163,74,.22)}}
.sb-tree-processing{animation:sb-glow 1.3s ease-in-out infinite;}
.sb-tree-folder{margin-top:9px;font-size:15px;font-weight:550;color:var(--t1);cursor:pointer;padding:3px 5px}
.sb-tree-folder:first-child{margin-top:3px}
.sb-rename-btn,.sb-delete-btn{background:none;border:none;cursor:pointer;padding:0 3px;display:flex;align-items:center;opacity:0;transition:opacity .15s;flex-shrink:0}
.sb-rename-btn{color:var(--t3)}
.sb-delete-btn{color:var(--t3)}
.sb-tree-folder:hover .sb-rename-btn,.sb-tree-folder:hover .sb-delete-btn,.sb-tree-xml:hover .sb-delete-btn{opacity:1}
.sb-delete-btn:hover{color:#ef4444}
.sb-rename-input{flex:1;background:var(--raised);border:1px solid var(--green);border-radius:4px;padding:1px 5px;font-size:15px;font-family:'Inter',sans-serif;color:var(--t1);outline:none;min-width:0}
.sb-orig-name{font-size:9px;color:var(--t3);padding:0 4px 3px 28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;opacity:.7}
.sb-tree-xml,.sb-tree-zip{font-size:11.5px;color:var(--t3)}
.sb-tree-icon{flex-shrink:0;display:flex;align-items:center}
.sb-tree-icon-folder{color:#c09020}
.sb-tree-icon-xml{color:var(--blue)}
.sb-tree-icon-zip{color:#9b59b6}
.sb-tree-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.sb-tree-toggle{flex-shrink:0;color:var(--t3);display:flex;align-items:center;margin-left:2px;transition:transform .2s ease-out}
.sb-folder-group.sb-collapsed .sb-tree-toggle{transform:rotate(-90deg)}
.sb-folder-group.sb-collapsed .sb-tree-children{display:none}
.sb-new-contrib{width:100%;display:flex;align-items:center;gap:7px;padding:7.5px 10px;background:rgba(22,163,74,.11);border:1px solid rgba(22,163,74,.28);border-radius:8px;color:var(--green);font-size:12.5px;font-family:'Inter',sans-serif;font-weight:550;cursor:pointer;margin-bottom:9px;transition:background .12s,border-color .12s}
.sb-new-contrib:hover{background:rgba(22,163,74,.22);border-color:rgba(22,163,74,.45)}
.sb-contrib-list{display:flex;flex-direction:column;gap:1px}
.sb-contrib-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .12s}
.sb-contrib-item:hover{background:var(--raised)}
.sb-contrib-item.sb-active{background:var(--b1)}
.sb-contrib-avatar{width:29px;height:29px;border-radius:7px;background:var(--raised);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--green);flex-shrink:0;letter-spacing:-.01em}
.sb-contrib-item.sb-active .sb-contrib-avatar{background:rgba(22,163,74,.22)}
.sb-contrib-info{flex:1;min-width:0}
.sb-contrib-name{font-size:12.5px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-contrib-rfc{font-size:10.5px;color:var(--t3);font-variant-numeric:tabular-nums;letter-spacing:.01em}
.sb-despacho-opts{display:flex;flex-direction:column;gap:6px}
.sb-despacho-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 11px;background:var(--raised);border:1px solid var(--b1);border-radius:9px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:background .12s,border-color .12s}
.sb-despacho-btn:hover{background:var(--card);border-color:var(--b2)}
.sb-db-icon{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-despacho-btn.sb-crear .sb-db-icon{background:rgba(22,163,74,.22);color:var(--green)}
.sb-despacho-btn.sb-unirse .sb-db-icon{background:rgba(37,99,235,.15);color:var(--blue)}
.sb-db-text{flex:1}
.sb-db-title{font-size:13px;font-weight:530;color:var(--t1)}
.sb-db-desc{font-size:10.5px;color:var(--t3);margin-top:1px}
.sb-db-arrow{color:var(--t3);flex-shrink:0;transition:transform .15s ease-out,color .12s}
.sb-despacho-btn:hover .sb-db-arrow{transform:translateX(2px);color:var(--t2)}
.layout{display:flex;gap:0;align-items:flex-start;margin-left:258px;padding:0 18px;height:calc(100vh - 54px)}
.lpanel{flex-shrink:0;width:272px;transition:width .35s cubic-bezier(.4,0,.2,1),opacity .25s,margin .35s;overflow-x:hidden;overflow-y:auto;display:flex;flex-direction:column;gap:0;opacity:1;margin-right:18px;position:sticky;top:54px;height:calc(100vh - 54px);background:var(--card);border:none;border-right:1px solid var(--b1);border-radius:0;box-shadow:3px 0 14px rgba(0,0,0,.06)}
.lpanel.closed{width:0;opacity:0;margin-right:0;pointer-events:none}
.rpanel{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;padding:18px 0 24px;height:calc(100vh - 54px);overflow-y:auto}
.ppill{writing-mode:vertical-rl;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;width:26px;min-width:26px;background:var(--card);border:1px solid var(--b1);border-radius:8px;cursor:pointer;padding:12px 0;font-size:10px;font-weight:500;color:var(--t2);letter-spacing:.07em;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .15s;flex-shrink:0;margin-right:14px;position:sticky;top:70px;height:fit-content}
.ppill:hover{background:var(--raised)}
/* ── Panel lateral unificado ── */
.ps-topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b1);background:var(--raised);border-radius:0;flex-shrink:0}
.ps-section{border-bottom:1px solid var(--b1);flex-shrink:0}
.ps-section:last-child{border-bottom:none}
.ps-hdr{width:100%;display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:background .18s;position:relative;text-align:left}
.ps-hdr:hover{background:rgba(0,0,0,.025)}
.ps-hdr[aria-expanded="true"]{background:var(--raised)}
.ps-hdr[aria-expanded="true"]::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2.5px;background:var(--blue);border-radius:0 3px 3px 0}
.ps-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1),opacity .22s ease;opacity:0;pointer-events:none}
.ps-body.ps-open{grid-template-rows:1fr;opacity:1;pointer-events:auto}
.ps-inner{overflow:hidden;min-height:0}
.ps-chev{font-size:9px;color:var(--t3);transition:transform .3s cubic-bezier(.4,0,.2,1);display:inline-block;flex-shrink:0;margin-left:6px}
.ps-chev.open{transform:rotate(180deg)}
/* ── Upload visual area ── */
.upload-drop{border:2px dashed var(--b2);border-radius:8px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .25s ease;background:rgba(22,163,74,.02)}
.upload-drop:hover{border-color:var(--green);background:rgba(22,163,74,.07);box-shadow:0 2px 8px rgba(22,163,74,.1)}
.upload-drop.drag-over{border-color:var(--blue);background:rgba(37,99,235,.06);transform:scale(1.02);box-shadow:0 4px 14px rgba(37,99,235,.12)}
/* ── Sidebar rows ── */
.contrib-row{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;transition:all .18s ease;border-left:3px solid transparent;margin-left:-12px;margin-right:-12px}
.contrib-row:hover{background:rgba(22,163,74,.05);border-left-color:var(--green)}
.folder-row{display:flex;align-items:center;gap:8px;padding:9px 14px 9px 26px;cursor:pointer;transition:all .18s ease;border-left:2px solid transparent;margin-left:-12px;margin-right:-12px;font-size:11px;color:var(--t2)}
.folder-row:hover{background:rgba(22,163,74,.06);color:var(--green);border-left-color:var(--green)}
.file-row{display:flex;align-items:center;gap:7px;padding:7px 14px 7px 44px;cursor:default;transition:background .15s ease;border-left:2px solid transparent;margin-left:-12px;margin-right:-12px;font-size:11px;color:var(--t3)}
.file-row:hover{background:rgba(22,163,74,.05);border-left-color:rgba(22,163,74,.4)}
.folder-row.sel{background:rgba(22,163,74,.08);border-left-color:var(--green);color:var(--green);transform:scale(1.012);box-shadow:inset 0 0 0 1px rgba(22,163,74,.15)}
.folder-row.sel:hover{background:rgba(22,163,74,.12)}
.file-row.sel{background:rgba(22,163,74,.07);border-left-color:var(--green);color:var(--green);transform:scale(1.01)}
/* ── Despacho action buttons ── */
.desp-btn{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--b1);background:var(--card);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--t2);display:flex;align-items:center;gap:9px;transition:all .18s ease;text-align:left;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.desp-btn:hover{background:rgba(22,163,74,.06);border-color:rgba(22,163,74,.35);color:var(--green);transform:translateX(2px);box-shadow:0 2px 8px rgba(22,163,74,.1)}
/* ── Slide-in animation ── */
@keyframes slideInLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
.slide-in{animation:slideInLeft .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp .2s ease forwards}
@keyframes spin{to{transform:rotate(360deg)}}.sp{animation:spin .7s linear infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}.pulse{animation:pulse 2s infinite}
/* ── Excel table ── */
.xl-wrap{background:#fff;border:1px solid #c8c8c8;border-radius:4px;overflow:hidden}
.xl-scroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 330px);min-height:180px}
.xl-table{border-collapse:collapse;font-size:11px;font-family:'Calibri','Segoe UI',sans-serif;background:#fff;color:#000}
.xl-table th,.xl-table td{border:1px solid #d0d0d0;padding:2px 7px;white-space:nowrap}
.xl-th{background:#e2efda;color:#1f3d0c;font-weight:600;text-align:left;position:sticky;top:0;z-index:2}
.xl-th.n{text-align:right}
.xl-rn{background:#f2f2f2;color:#777;text-align:center;font-size:10px;min-width:28px;user-select:none}
.xl-even td:not(.xl-rn){background:#fff}
.xl-odd  td:not(.xl-rn){background:#f7f7f7}
.xl-mhdr td{background:#bdd7ee;color:#1f3864;font-weight:700;font-size:10px;letter-spacing:.05em;padding:4px 7px;border-top:1.5px solid #2f75b6}
.xl-mtot td{background:#fff2cc;font-weight:700;border-top:2.5px solid #000!important}
.xl-gtot td{background:#fce4d6;font-weight:700;border-top:3px solid #000!important}
.xl-blank td{background:#fff;border-color:#efefef}
.xl-num{text-align:right;font-variant-numeric:tabular-nums}
.xl-zero{text-align:right;color:#c0c0c0}
.xi{color:#16a34a;font-weight:600}.xe{color:#dc2626;font-weight:600}.xt{color:#2563eb;font-weight:600}
.sh-tab{padding:4px 14px;font-size:11px;cursor:pointer;border:1px solid #ccc;background:#e5e5e5;color:#555;transition:all .15s;font-weight:500}
.sh-tab.active{background:#fff;border-bottom-color:#fff;color:#000;font-weight:600;position:relative;top:1px}
.tipo-btn{flex:1;padding:5px 4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--b2);border-radius:5px;background:var(--card);color:var(--t2);transition:all .15s;text-align:center}
.tipo-btn.active-i{background:#f0fdf4;border-color:#86efac;color:#15803d;font-weight:600}
.tipo-btn.active-e{background:#fef2f2;border-color:#fca5a5;color:#dc2626;font-weight:600}

/* ══ PARSER ══ */
const parseCFDI=xmlText=>{
  const fail=msg=>({ok:false,err:[msg],adv:[],comp:{},fiscal:{},concs:[]});
  let doc;try{doc=new DOMParser().parseFromString(xmlText,'application/xml');}catch{return fail('No se pudo parsear.');}
  if(doc.querySelector('parsererror'))return fail('XML malformado.');
  const root=doc.documentElement;
  if(!(root.localName||'').includes('Comprobante')&&!(root.tagName||'').includes('Comprobante'))
    return fail(`No es CFDI: ${root.localName||root.tagName}`);
  const NS=['http://www.sat.gob.mx/cfd/4','http://www.sat.gob.mx/cfd/3'];
  const q1=(p,n)=>{for(const ns of NS){const r=p.getElementsByTagNameNS(ns,n)[0];if(r)return r;}return p.getElementsByTagName('cfdi:'+n)[0]||p.getElementsByTagName(n)[0]||null;};
  const qA=(p,n)=>{for(const ns of NS){const r=p.getElementsByTagNameNS(ns,n);if(r.length)return[...r];}const a=p.getElementsByTagName('cfdi:'+n);return a.length?[...a]:[...p.getElementsByTagName(n)];};
  const at=(el,k)=>(el&&(el.getAttribute(k)||el.getAttribute(k.toLowerCase())))||'';
  const nm=(el,k)=>parseFloat(at(el,k))||0;
  const tfdEl=[...root.getElementsByTagName('*')].find(e=>e.localName==='TimbreFiscalDigital');
  const uuid=tfdEl?at(tfdEl,'UUID'):'';
  const fechaTim=tfdEl?at(tfdEl,'FechaTimbrado'):'';
  const em=q1(root,'Emisor'),re=q1(root,'Receptor');
  const sub=nm(root,'SubTotal'),des=nm(root,'Descuento'),total=nm(root,'Total');
  const impEl=q1(root,'Impuestos');
  let ivaFac=0,iepsFac=0,retIvaF=0,retIsrF=0;
  if(impEl){
    const trls=qA(impEl,'Traslado');
    if(trls.length){trls.forEach(t=>{const x=at(t,'Impuesto'),v=nm(t,'Importe');if(x==='002')ivaFac+=v;else if(x==='003')iepsFac+=v;});}
    else ivaFac=nm(impEl,'TotalImpuestosTrasladados');
    const rets=qA(impEl,'Retencion');
    if(rets.length){rets.forEach(r=>{const x=at(r,'Impuesto'),v=nm(r,'Importe');if(x==='001')retIsrF+=v;else if(x==='002')retIvaF+=v;});}
    else retIvaF=nm(impEl,'TotalImpuestosRetenidos');
  }
  const concs=[];
  const ccEl=q1(root,'Conceptos');
  if(ccEl){
    qA(ccEl,'Concepto').forEach(c=>{
      const cImp=q1(c,'Impuestos');
      let tasaIva='',impIva=0,tasaIeps='',impIeps=0,retIvaC=0,retIsrC=0;
      if(cImp){
        qA(cImp,'Traslado').forEach(t=>{
          const x=at(t,'Impuesto');
          if(x==='002'){const tasa=nm(t,'TasaOCuota');tasaIva=at(t,'TipoFactor')==='Exento'?'Exento':(tasa?`${(tasa*100).toFixed(0)}%`:'');impIva=nm(t,'Importe');}
          else if(x==='003'){tasaIeps=`${(nm(t,'TasaOCuota')*100).toFixed(2)}%`;impIeps=nm(t,'Importe');}
        });
        qA(cImp,'Retencion').forEach(r=>{const x=at(r,'Impuesto'),v=nm(r,'Importe');if(x==='001')retIsrC+=v;else if(x==='002')retIvaC+=v;});
      }
      concs.push({
        clave_prod:at(c,'ClaveProdServ'),no_id:at(c,'NoIdentificacion'),
        desc:at(c,'Descripcion'),cant:nm(c,'Cantidad'),
        clave_unidad:at(c,'ClaveUnidad'),unidad:at(c,'Unidad'),
        pu:nm(c,'ValorUnitario'),importe:nm(c,'Importe'),desc_conc:nm(c,'Descuento'),
        tasaIva,impIva,tasaIeps,impIeps,retIvaC,retIsrC,
      });
    });
  }
  const adv=[];
  const calc=+(sub-des+ivaFac+iepsFac-retIvaF-retIsrF).toFixed(2);
  if(Math.abs(calc-total)>0.10)adv.push(`Diferencia calculada: ${peso(calc)} vs ${peso(total)}`);
  return{ok:true,err:[],adv,
    comp:{uuid,tipo:at(root,'TipoDeComprobante'),serie:at(root,'Serie'),folio:at(root,'Folio'),
      fecha:at(root,'Fecha'),fechaTim,formaPago:at(root,'FormaPago'),metodoPago:at(root,'MetodoPago'),
      lugarExp:at(root,'LugarExpedicion'),moneda:at(root,'Moneda')||'MXN',tipoCambio:nm(root,'TipoCambio'),
      rfcEm:at(em,'Rfc'),nomEm:at(em,'Nombre'),regEm:at(em,'RegimenFiscal'),
      rfcRe:at(re,'Rfc'),nomRe:at(re,'Nombre'),usoCFDI:at(re,'UsoCFDI'),
      regRe:at(re,'RegimenFiscalReceptor'),domRe:at(re,'DomicilioFiscalReceptor')},
    fiscal:{sub,des,ivaFac,iepsFac,retIvaF,retIsrF,total},
    concs};
};

/* ══ CARPETAS ══ */
const readDir=r=>new Promise(res=>{const all=[];const go=()=>r.readEntries(es=>{if(!es.length){res(all);return;}all.push(...es);go();},()=>res(all));go();});
const readEntry=async e=>{if(e.isFile)return new Promise(r=>e.file(f=>r([f]),()=>r([])));if(e.isDirectory){try{const es=await readDir(e.createReader());return(await Promise.all(es.map(readEntry))).flat();}catch{return[];}}return[];};

/* ══ EXTRACCIÓN ZIP ══ */
const isZip=f=>f.name.toLowerCase().endsWith('.zip')||f.type==='application/zip'||f.type==='application/x-zip-compressed';
const extractZip=async zipFile=>{
  try{
    const JSZip=window.JSZip;
    if(!JSZip)return{xmls:[],skip:[]};
    const zip=await JSZip.loadAsync(zipFile);
    const xmls=[],skip=[];
    const tasks=[];
    zip.forEach((path,entry)=>{
      if(entry.dir)return;
      const name=path.split('/').pop()||path;
      if(name.toLowerCase().endsWith('.xml')){
        tasks.push(entry.async('blob').then(blob=>{
          const f=new File([blob],name,{type:'text/xml'});
          xmls.push(f);
        }));
      }else if(!name.startsWith('.')){
        skip.push({name,source:zipFile.name});
      }
    });
    await Promise.all(tasks);
    return{xmls,skip};
  }catch{return{xmls:[],skip:[]};}
};

/* ══ FILAS ══ */
const toRows=(results,miRfc)=>{
  const rows=[];
  results.filter(r=>r.data?.ok).forEach(r=>{
    const {comp:c,fiscal:f,concs}=r.data;
    let tipo=c.tipo;

    else if(miRfc){
      if(c.rfcEm===miRfc)tipo='I';
      else if(c.rfcRe===miRfc)tipo='E';
    }
    const base={
      uuid:c.uuid,archivo:r.name,tipo_cfdi:c.tipo,serie:c.serie,folio:c.folio,
      fecha:c.fecha,fecha_tim:c.fechaTim,forma_pago:c.formaPago,metodo_pago:c.metodoPago,
      lugar_exp:c.lugarExp,moneda:c.moneda,tipo_cambio:c.tipoCambio,
      rfc_em:c.rfcEm,nom_em:c.nomEm,reg_em:c.regEm,
      rfc_re:c.rfcRe,nom_re:c.nomRe,uso_cfdi:c.usoCFDI,reg_re:c.regRe,dom_re:c.domRe,
      subtotal:f.sub,desc_fac:f.des,iva_fac:f.ivaFac,ieps_fac:f.iepsFac,
      ret_iva_fac:f.retIvaF,ret_isr_fac:f.retIsrF,total:f.total,
      _tipo:tipo,_uuid:c.uuid,
    };
    (concs.length?concs:[{}]).forEach(conc=>rows.push({
      ...base,
      clave_prod:conc.clave_prod||'',no_id:conc.no_id||'',
      descripcion:conc.desc||'',cantidad:conc.cant||0,
      clave_unidad:conc.clave_unidad||'',unidad:conc.unidad||'',
      valor_unit:conc.pu||0,importe:conc.importe||0,desc_conc:conc.desc_conc||0,
      tasa_iva_c:conc.tasaIva||'',
      tasa_ieps_c:conc.tasaIeps||'',imp_ieps_c:conc.impIeps||0,
      ret_iva_c:conc.retIvaC||0,ret_isr_c:conc.retIsrC||0,
    }));
  });
  return rows;
};

/* ══ SUMA CON DEDUPLICACIÓN ══ */
const sumN=(rows,cols)=>cols.reduce((a,c)=>{

  if(c.facturalevel){
    const seen=new Set();
    a[c.key]=rows.reduce((s,r)=>{if(seen.has(r._uuid))return s;seen.add(r._uuid);return s+(r[c.key]||0);},0);
  }else{
    a[c.key]=rows.reduce((s,r)=>s+(r[c.key]||0),0);
  }
  return a;
},{});

                    <button type="submit" disabled={authLoading} style={{width:'100%',padding:'12px',borderRadius:9,background:'#16a34a',border:'none',color:'#fafafa',fontSize:13,fontWeight:700,cursor:authLoading?'not-allowed':'pointer',marginTop:8,marginBottom:12,fontFamily:'Inter,sans-serif',opacity:authLoading?.7:1}}>
                      {authLoading?'Procesando...':(mode==='login'?'Entrar':'Crear cuenta')}
                    </button>
                  </form>
                  <div style={{display:'flex',alignItems:'center',gap:10,margin:'0 0 12px'}}>
                    <div style={{flex:1,height:1,background:'var(--hp-b)'}}/><span style={{fontSize:11,color:'var(--hp-t3)'}}>o</span><div style={{flex:1,height:1,background:'var(--hp-b)'}}/>

                    Continuar sin cuenta

                </div>
              )}

      {/* FOOTER */}
      <footer style={{borderTop:'1px solid var(--hp-b)',padding:'20px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:26,height:26,background:'#16a34a',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="#fafafa" opacity=".9"/><rect x="8" y="1" width="5" height="5" rx="1" fill="#fafafa" opacity=".55"/><rect x="1" y="8" width="5" height="5" rx="1" fill="#fafafa" opacity=".55"/><rect x="8" y="8" width="5" height="5" rx="1" fill="#fafafa" opacity=".85"/></svg>
          </div>
          <span style={{fontSize:12,fontWeight:600,color:'var(--hp-t1)'}}>SAT CFDI Processor</span>

};

  const onKey=e=>{if(e.key==='Escape')onClose();};

  <div role="dialog" aria-modal="true" aria-labelledby="sep-modal-title"
    onKeyDown={onKey}
    style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16,background:'rgba(0,0,0,.35)',backdropFilter:'blur(4px)'}}>

        {k:'dos-archivos',t:'Dos archivos',d:'Dos .xlsx independientes por tipo.'}].map(o=>(

/* ══ TABLA EXCEL ══ */
const ExcelTable=({rows,xf,visCols,tab,setTab,onHideCol,onMoveCol})=>{
  const [colMenu,setColMenu]=useState(null);
  const [movingCol,setMovingCol]=useState(null);
  const dr=useMemo(()=>{
    let r=xf.separar&&xf.sepModo==='dos-hojas'?rows.filter(x=>tab==='I'?x._tipo==='I':x._tipo==='E'):[...rows];
    if(xf.ordenFecha==='asc')r.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(xf.ordenFecha==='desc')r.sort((a,b)=>b.fecha.localeCompare(a.fecha));
    return r;
  },[rows,xf,tab]);
  const totalCols=visCols.length;
  const nonNumCount=visCols.filter(c=>!c.numeric).length;
  const Num=({col,v,b})=>{
    if(!v&&v!==0||v===0)return<td className="xl-zero" style={b?{fontWeight:700}:{}}>—</td>;
    return<td className="xl-num" style={b?{fontWeight:700}:{}}>{col.currency===false?numFmt(v):peso(v)}</td>;
  };
  const ColHdr=()=>(
    <tr>{visCols.map((c,ci)=>{
      const isMoving=movingCol===c.key;
      return(
      <th key={c.key} className={`xl-th${c.numeric?' n':''}`}
        style={{position:'static',zIndex:1,cursor:'pointer',userSelect:'none',...(isMoving?{background:'#dbeafe',outline:'2px solid #3b82f6',outlineOffset:'-1px'}:{})}}
        onClick={e=>{e.stopPropagation();if(movingCol){setMovingCol(null);return;}setColMenu(cm=>cm?.key===c.key?null:{key:c.key,label:c.label,x:e.clientX,y:e.clientY});}}>
        {isMoving?(
          <span style={{display:'flex',alignItems:'center',gap:2,justifyContent:'center'}}>
            <button onClick={e=>{e.stopPropagation();onMoveCol&&onMoveCol(c.key,-1);}} style={{background:'none',border:'none',cursor:'pointer',color:'#1d4ed8',fontWeight:800,fontSize:14,padding:'0 3px',lineHeight:1}}>‹</button>
            <span>{c.label}</span>
            <button onClick={e=>{e.stopPropagation();onMoveCol&&onMoveCol(c.key,1);}} style={{background:'none',border:'none',cursor:'pointer',color:'#1d4ed8',fontWeight:800,fontSize:14,padding:'0 3px',lineHeight:1}}>›</button>
          </span>
        ):c.label}
      </th>
      );
    })}</tr>
  );
  const DataRow=({row,idx})=>(
    <tr className={idx%2===0?'xl-even':'xl-odd'}>
      {visCols.map(c=>{
        if(c.numeric)return<Num key={c.key} col={c} v={row[c.key]}/>;
        let val=row[c.key]||'—';
        if(c.key==='tipo_cfdi')val=<span className={{I:'xi',E:'xe',T:'xt'}[row['_tipo']]||''}>{tipoLabel(row['_tipo'])}</span>;
        else if(c.key==='fecha'||c.key==='fecha_tim')val=row[c.key]?.slice(0,10)||'—';
        else if(c.key==='uuid')val=<span title={row[c.key]} style={{fontFamily:'monospace',fontSize:9.5}}>{row[c.key]?row[c.key].slice(0,8)+'…':''}</span>;
        return<td key={c.key} style={{maxWidth:c.key==='descripcion'||c.key==='nom_em'||c.key==='nom_re'?220:c.key==='uuid'?100:160,overflow:'hidden',textOverflow:'ellipsis'}}>{val}</td>;
      })}
    </tr>
  );
  const TotRow=({subRows,label,cls='xl-mtot'})=>{
    const s=sumN(subRows,visCols.filter(c=>c.numeric));
    let labeled=false;
    return(<tr className={cls}>
      {visCols.map(c=>{
        if(!c.numeric){
          if(!labeled){labeled=true;return<td key={c.key} style={{fontWeight:700,fontSize:10}}>{label}</td>;}
          return<td key={c.key}></td>;
        }
        if(c.noSum)return<td key={c.key} className="xl-zero"></td>;
        return<Num key={c.key} col={c} v={s[c.key]||0} b/>;
      })}
    </tr>);
  };
  const Blank=()=><tr className="xl-blank">{Array(totalCols).fill(null).map((_,i)=><td key={i}>&nbsp;</td>)}</tr>;
  const MHdr=({label,bg,fg})=><tr className="xl-mhdr" style={bg?{background:bg}:{}}><td colSpan={totalCols} style={fg?{color:fg}:{}}>{label.toUpperCase()}</td></tr>;
  const YearHdr=({yr})=><tr><td colSpan={totalCols} style={{background:'#1e3a5f',color:'#fff',fontWeight:700,fontSize:11,padding:'5px 8px',letterSpacing:'.05em'}}>{'▶ AÑO '+yr}</td></tr>;
  const buildMonthRows=subRows=>{
    const map=new Map();subRows.forEach(r=>{const k=monthKey(r.fecha);if(!map.has(k))map.set(k,[]);map.get(k).push(r);});
    const sorted=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
    return(<>{sorted.map(([k,mr])=>(<React.Fragment key={k}>
      <MHdr label={monthLabel(k)}/>
      <ColHdr/>
      {mr.map((r,i)=><DataRow key={i} row={r} idx={i}/>)}
      <TotRow subRows={mr} label={`Total ${monthLabel(k)}`}/>
      <Blank/><Blank/>
    </React.Fragment>))}</>);
  };
  const buildRows=subRows=>{
    if(!xf.sumasMensuales)return(<>
      {subRows.map((r,i)=><DataRow key={i} row={r} idx={i}/>)}
      {subRows.length>0&&<TotRow subRows={subRows} label="TOTAL GENERAL" cls="xl-gtot"/>}
    </>);
    const yrMap=new Map();subRows.forEach(r=>{const yr=r.fecha?r.fecha.slice(0,4):'????';if(!yrMap.has(yr))yrMap.set(yr,[]);yrMap.get(yr).push(r);});
    const yrs=[...yrMap.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
    if(yrs.length===1)return(<>{buildMonthRows(subRows)}{subRows.length>0&&<TotRow subRows={subRows} label="TOTAL GENERAL" cls="xl-gtot"/>}</>);
    return(<>{yrs.map(([yr,yrows])=>(<React.Fragment key={yr}>
      <YearHdr yr={yr}/>
      {buildMonthRows(yrows)}
      <TotRow subRows={yrows} label={`TOTAL ${yr}`} cls="xl-gtot"/>
      <Blank/><Blank/>
    </React.Fragment>))}
    <TotRow subRows={subRows} label="TOTAL GENERAL" cls="xl-gtot"/>
    </>);
  };
  useEffect(()=>{
    if(!colMenu)return;
    const close=()=>setColMenu(null);
    document.addEventListener('click',close);
    return()=>document.removeEventListener('click',close);
  },[colMenu]);
  useEffect(()=>{
    if(!movingCol)return;
    const onKey=e=>{
      if(e.key==='ArrowLeft'){e.preventDefault();onMoveCol&&onMoveCol(movingCol,-1);}
      else if(e.key==='ArrowRight'){e.preventDefault();onMoveCol&&onMoveCol(movingCol,1);}
      else if(e.key==='Enter'||e.key==='Escape')setMovingCol(null);
    };
    const onOut=()=>setMovingCol(null);
    document.addEventListener('keydown',onKey);
    document.addEventListener('click',onOut);
    return()=>{document.removeEventListener('keydown',onKey);document.removeEventListener('click',onOut);};
  },[movingCol,onMoveCol]);
  if(!dr.length)return(<div style={{textAlign:'center',padding:'40px 20px',color:'var(--t3)',fontSize:12,background:'#fff',borderRadius:4,border:'1px solid #d0d0d0'}}>Sin datos · procesa XML para ver la vista previa.</div>);
  return(
    <div className="xl-wrap">
      {colMenu&&(
        <div onClick={e=>e.stopPropagation()} style={{position:'fixed',top:colMenu.y+4,left:colMenu.x,zIndex:9999,background:'#fff',border:'1px solid #d0d0d0',borderRadius:7,boxShadow:'0 6px 20px rgba(0,0,0,.14)',minWidth:170,overflow:'hidden'}}>
          <div style={{padding:'7px 13px 5px',fontSize:11,color:'#555',fontWeight:600,borderBottom:'1px solid #eee',background:'#f7f7f7'}}>{colMenu.label}</div>
          {(()=>{const tk=(xf.separar&&xf.sepModo==='dos-hojas')?tab:null;return(<>
          <button style={{display:'block',width:'100%',padding:'8px 13px',background:'none',border:'none',textAlign:'left',cursor:'pointer',fontSize:12,color:'var(--t1)',fontWeight:500,borderBottom:'1px solid #eee'}}
            onClick={e=>{e.stopPropagation();setMovingCol(colMenu.key);setColMenu(null);}}>
            Recorrer ← →<span style={{fontSize:10,color:'var(--t3)',marginLeft:6}}>Enter o clic para salir</span>
          </button>
          <button style={{display:'block',width:'100%',padding:'8px 13px',background:'none',border:'none',textAlign:'left',cursor:'pointer',fontSize:12,color:'#dc2626',fontWeight:500}}
            aria-label={`Ocultar columna ${colMenu.label}`}
            onClick={()=>{onHideCol(colMenu.key,tk);setColMenu(null);}}>
            Ocultar columna{tk?<span style={{fontSize:10,color:'#b45309',marginLeft:5}}>({tk==='I'?'solo Ingresos':'solo Gastos'})</span>:''}
          </button>
          </>);})()}
        </div>
      )}
      {xf.separar&&xf.sepModo==='dos-hojas'&&(
        <div style={{display:'flex',borderBottom:'1px solid #ccc',background:'#e5e5e5'}}>
          {[{k:'I',l:'📋 Ingresos'},{k:'E',l:'📋 Gastos'}].map(t=>(
            <button key={t.k} className={`sh-tab${tab===t.k?' active':''}`} onClick={()=>setTab(t.k)}>{t.l}</button>
          ))}
        </div>
      )}
      <div className="xl-scroll">
        <table className="xl-table">
          <thead><ColHdr/></thead>
          <tbody>
            {xf.separar&&xf.sepModo==='misma'?(<>
              {rows.filter(r=>r._tipo==='I').length>0&&<>
                <MHdr label="▶ Ingresos" bg="#e2efda" fg="#14532d"/>
                <ColHdr/>
                {buildRows(rows.filter(r=>r._tipo==='I'))}<Blank/><Blank/>
              </>}
              {rows.filter(r=>r._tipo==='E').length>0&&<>
                <MHdr label="▶ Gastos / Egresos" bg="#fce4d6" fg="#7c2d12"/>
                <ColHdr/>
                {buildRows(rows.filter(r=>r._tipo==='E'))}<Blank/><Blank/>
              </>}
              {rows.filter(r=>!['I','E'].includes(r._tipo)).length>0&&buildRows(rows.filter(r=>!['I','E'].includes(r._tipo)))}
            </>):buildRows(dr)}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const App=()=>{

  const [sbEditingFolder,setSbEditingFolder]=useState(null);
  const sbEditRef=useRef(null);
  const [secUpload,setSecUpload]=useState(true);
  const [secContrib,setSecContrib]=useState(false);
  const [secDespacho,setSecDespacho]=useState(false);
  const [contribView,setContribView]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [excludedFiles,setExcludedFiles]=useState(()=>new Set());
  const dropRef=useRef(null),fileRef=useRef(null),folderRef=useRef(null),filesRef=useRef([]);
  useEffect(()=>{filesRef.current=files;},[files]);

  useEffect(()=>{
    if(!sb){return;}
    sb.auth.getSession().then(({data:{session}})=>setUser(session?.user??null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{
      setUser(session?.user??null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleSignOut=useCallback(async()=>{
    if(sb)await sb.auth.signOut();
    setUser(null);
  },[]);

  useEffect(()=>{
    try{const s=localStorage.getItem(CFG_KEY);if(s){setXf(p=>({...DEFAULT_XF,...JSON.parse(s)}));setHasSavedConfig(true);}}catch{}
    const no=e=>e.preventDefault();
    document.addEventListener('dragover',no);document.addEventListener('drop',no);
    return()=>{document.removeEventListener('dragover',no);document.removeEventListener('drop',no);};
  },[]);

  useEffect(()=>{
    const zone=dropRef.current;if(!zone)return;
    const onEnter=e=>{e.preventDefault();e.stopPropagation();setDrag(true);};
    const onOver =e=>{e.preventDefault();e.stopPropagation();};
    const onLeave=e=>{if(!zone.contains(e.relatedTarget))setDrag(false);};
    const onDrop =async e=>{
      e.preventDefault();e.stopPropagation();setDrag(false);
      {const _di=[...e.dataTransfer.items||[]];const _df=[...e.dataTransfer.files||[]];if(_di.length&&typeof _di[0].webkitGetAsEntry==='function'){const _en=_di[0].webkitGetAsEntry?.();if(_en?.isDirectory)setLastUploadInfo({type:'folder',name:_en.name});else{const _f=_di[0].getAsFile?.();if(_f)setLastUploadInfo({type:isZip(_f)?'zip':'xml',name:_f.name});}}else if(_df.length){const _f=_df[0];setLastUploadInfo({type:isZip(_f)?'zip':'xml',name:_f.name});}}
      const tagged=[],skip=[];
      try{
        const items=[...e.dataTransfer.items||[]];
        if(items.length&&typeof items[0].webkitGetAsEntry==='function'){
          const entries=items.map(it=>it.webkitGetAsEntry()).filter(Boolean);
          for(const en of entries){
            const carpeta=en.isDirectory?en.name:null;
            const fs=await readEntry(en);
            for(const f of fs){
              if(f.name.toLowerCase().endsWith('.xml')){tagged.push({file:f,carpeta});}
              else if(isZip(f)){const r=await extractZip(f);tagged.push(...r.xmls.map(x=>({file:x,carpeta:carpeta||f.name})));skip.push(...r.skip);}
              else skip.push({name:f.name,source:carpeta||'suelto'});
            }
          }
        }else{
          for(const f of [...e.dataTransfer.files||[]]){
            if(f.name.toLowerCase().endsWith('.xml')){tagged.push({file:f,carpeta:null});}
            else if(isZip(f)){const r=await extractZip(f);tagged.push(...r.xmls.map(x=>({file:x,carpeta:f.name})));skip.push(...r.skip);}
            else skip.push({name:f.name,source:'suelto'});
          }
        }
      }catch{[...e.dataTransfer.files||[]].forEach(f=>{if(f.name.toLowerCase().endsWith('.xml'))tagged.push({file:f,carpeta:null});});}
      addTaggedFiles(tagged,skip);
    };
    zone.addEventListener('dragenter',onEnter);zone.addEventListener('dragover',onOver);
    zone.addEventListener('dragleave',onLeave);zone.addEventListener('drop',onDrop);
    return()=>{zone.removeEventListener('dragenter',onEnter);zone.removeEventListener('dragover',onOver);zone.removeEventListener('dragleave',onLeave);zone.removeEventListener('drop',onDrop);};
  },[page]);


  const upXf=p=>setXf(x=>({...x,...p}));

  /* ── Auto-selección contribuyente más repetido ── */
  useEffect(()=>{
    if(xf.miRfc||results.length===0)return;
    const SKIP=new Set(['XAXX010101000','XEXX010101000','']);
    const cnt=new Map();
    results.filter(r=>r.data?.ok).forEach(r=>{
      const c=r.data.comp;
      if(c.rfcEm&&!SKIP.has(c.rfcEm))cnt.set(c.rfcEm,(cnt.get(c.rfcEm)||0)+1);
      if(c.rfcRe&&!SKIP.has(c.rfcRe))cnt.set(c.rfcRe,(cnt.get(c.rfcRe)||0)+1);
    });
    if(!cnt.size)return;
    const best=[...cnt.entries()].sort((a,b)=>b[1]-a[1])[0][0];
    if(best)upXf({miRfc:best});
  },[results]);
  const upInv=p=>setInvF(x=>({...x,...p}));
  const saveConfig=()=>{localStorage.setItem(CFG_KEY,JSON.stringify(xf));setHasSavedConfig(true);setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2000);};

  const allRows=useMemo(()=>toRows(results,xf.miRfc),[results,xf.miRfc]);
  const filteredRows=useMemo(()=>{
    let rows=xf.tipoFiltro==='todos'?allRows:allRows.filter(r=>r._tipo===xf.tipoFiltro);
    if(selectedFileNames)rows=rows.filter(r=>selectedFileNames.has(r.archivo));
    return rows;
  },[allRows,xf.tipoFiltro,selectedFileNames]);

  /* Mapa uuid → _tipo para facturas individuales */
  const tipoMap=useMemo(()=>{const m=new Map();allRows.forEach(r=>m.set(r._uuid,r._tipo));return m;},[allRows]);

  const okCount=results.filter(r=>r.data?.ok).length;
  const errCount=results.length-okCount;
  const pending=files.filter(f=>f.status==='pending'&&!excludedFiles.has(f.id));
  const isActive=busy||files.some(f=>f.status==='processing');

  const totalIngs=useMemo(()=>{const seen=new Set();return allRows.filter(r=>r._tipo==='I'&&!seen.has(r._uuid)&&(seen.add(r._uuid),true)).reduce((s,r)=>s+r.total,0);},[allRows]);
  const totalEgs=useMemo(()=>{const seen=new Set();return allRows.filter(r=>r._tipo==='E'&&!seen.has(r._uuid)&&(seen.add(r._uuid),true)).reduce((s,r)=>s+r.total,0);},[allRows]);

  /* Contribuyentes únicos de los XML procesados (emisores y receptores) */
  const allContribs=useMemo(()=>{
    const m=new Map();
    results.filter(r=>r.data?.ok).forEach(r=>{
      const c=r.data.comp;
      if(c.rfcEm)m.set(c.rfcEm,{rfc:c.rfcEm,nom:c.nomEm||c.rfcEm});
      if(c.rfcRe)m.set(c.rfcRe,{rfc:c.rfcRe,nom:c.nomRe||c.rfcRe});
    });
    return[...m.values()].sort((a,b)=>a.nom.localeCompare(b.nom));
  },[results]);

  const mostFreqContrib=useMemo(()=>{
    if(!results.some(r=>r.data?.ok))return null;
    const SKIP=new Set(['XAXX010101000','XEXX010101000','']);
    const cnt=new Map();
    results.filter(r=>r.data?.ok).forEach(r=>{
      const c=r.data.comp;
      if(c.rfcEm&&!SKIP.has(c.rfcEm))cnt.set(c.rfcEm,(cnt.get(c.rfcEm)||0)+1);
      if(c.rfcRe&&!SKIP.has(c.rfcRe))cnt.set(c.rfcRe,(cnt.get(c.rfcRe)||0)+1);
    });
    if(!cnt.size)return null;
    const bestRfc=[...cnt.entries()].sort((a,b)=>b[1]-a[1])[0][0];
    return allContribs.find(x=>x.rfc===bestRfc)||null;
  },[results,allContribs]);

  const sbFolderGroups=useMemo(()=>{
    const groups=new Map();
    files.forEach(function(f){const k=f.carpeta||null;if(!groups.has(k))groups.set(k,[]);groups.get(k).push(f);});
    return [...groups.entries()].filter(function(e){return e[0]!==null;});
  },[files]);

  const selectedFileNames=useMemo(()=>{
    if(!selectedSidebarItem)return null;
    const s=new Set();
    if(selectedSidebarItem.type==='file'){s.add(selectedSidebarItem.name);}
    else if(selectedSidebarItem.type==='folder'){
      files.filter(f=>f.carpeta===selectedSidebarItem.key).forEach(f=>s.add(f.name));
    }
    return s;
  },[selectedSidebarItem,files]);

  const currentTabKey=useMemo(()=>
    (xf.separar&&xf.sepModo==='dos-hojas')?tab:null
  ,[xf.separar,xf.sepModo,tab]);

  const rowsForTab=useMemo(()=>{
    if(!currentTabKey)return filteredRows;
    return filteredRows.filter(r=>r._tipo===currentTabKey);
  },[filteredRows,currentTabKey]);

  const visCols=useMemo(()=>{
    const hidTab=currentTabKey==='I'?(xf.colsOcultadasI||[]):currentTabKey==='E'?(xf.colsOcultadasE||[]):[];
    const hidSet=new Set([...xf.colsOcultadas,...hidTab]);
    let cols=COL_DEFS.filter(c=>{
      if(hidSet.has(c.key))return false;
      if(!c.removable)return true;
      if(xf.restauradas.includes(c.key))return true;
      if(!xf.eliminarCeros)return true;
      if(c.numeric)return rowsForTab.some(r=>(r[c.key]||0)!==0);
      return rowsForTab.some(r=>(r[c.key]||'')!=='');
    });
    const orderKey=currentTabKey==='I'?'colOrderI':currentTabKey==='E'?'colOrderE':'colOrder';
    const order=xf[orderKey];
    if(order&&order.length){
      const idxMap=new Map(order.map((k,i)=>[k,i]));
      cols=[...cols].sort((a,b)=>(idxMap.get(a.key)??9999)-(idxMap.get(b.key)??9999));
    }
    return cols;
  },[rowsForTab,xf,currentTabKey]);

  const moveColOrder=(key,dir)=>{
    const orderKey=currentTabKey==='I'?'colOrderI':currentTabKey==='E'?'colOrderE':'colOrder';
    const base=(xf[orderKey]&&xf[orderKey].length)?xf[orderKey]:visCols.map(c=>c.key);
    const idx=base.indexOf(key);
    if(idx===-1||idx+dir<0||idx+dir>=base.length)return;
    const a=[...base];[a[idx],a[idx+dir]]=[a[idx+dir],a[idx]];
    upXf({[orderKey]:a});
  };

  const hiddenCols=useMemo(()=>{
    const hidTab=currentTabKey==='I'?(xf.colsOcultadasI||[]):currentTabKey==='E'?(xf.colsOcultadasE||[]):[];
    return COL_DEFS.filter(c=>
      c.removable&&xf.eliminarCeros&&!xf.restauradas.includes(c.key)&&
      !xf.colsOcultadas.includes(c.key)&&!hidTab.includes(c.key)&&
      (c.numeric?!rowsForTab.some(r=>(r[c.key]||0)!==0):!rowsForTab.some(r=>(r[c.key]||'')!==''))
    );
  },[rowsForTab,xf,currentTabKey]);

  /* ── Filtros facturas individuales ── */
  const invMeses=useMemo(()=>[...new Set(results.filter(r=>r.data?.ok).map(r=>monthKey(r.data.comp.fecha)))].sort(),[results]);
  const invContribs=useMemo(()=>{
    const m=new Map();
    results.filter(r=>r.data?.ok).forEach(r=>{
      const c=r.data.comp;
      if(c.rfcEm)m.set(c.rfcEm,c.nomEm||c.rfcEm);
      if(c.rfcRe)m.set(c.rfcRe,c.nomRe||c.rfcRe);
    });
    return[...m.entries()].sort((a,b)=>a[1].localeCompare(b[1]));
  },[results]);

  const filteredResults=useMemo(()=>{
    let ok=results.filter(r=>r.data?.ok);
    if(selectedFileNames)ok=ok.filter(r=>selectedFileNames.has(r.name));
    const tipo=invF.tipo;
    if(tipo!=='todos')ok=ok.filter(r=>tipoMap.get(r.data.comp.uuid)===tipo);
    if(invF.mes!=='todos')ok=ok.filter(r=>monthKey(r.data.comp.fecha)===invF.mes);
    if(invF.contribuyente!=='todos')ok=ok.filter(r=>r.data.comp.rfcEm===invF.contribuyente||r.data.comp.rfcRe===invF.contribuyente);
    if(invF.orden==='fecha-asc')ok.sort((a,b)=>a.data.comp.fecha.localeCompare(b.data.comp.fecha));
    else if(invF.orden==='fecha-desc')ok.sort((a,b)=>b.data.comp.fecha.localeCompare(a.data.comp.fecha));
    else if(invF.orden==='total-desc')ok.sort((a,b)=>(b.data.fiscal?.total||0)-(a.data.fiscal?.total||0));
    else if(invF.orden==='total-asc')ok.sort((a,b)=>(a.data.fiscal?.total||0)-(b.data.fiscal?.total||0));
    else if(invF.orden==='emisor')ok.sort((a,b)=>(a.data.comp.nomEm||'').localeCompare(b.data.comp.nomEm||''));
    const err=results.filter(r=>!r.data?.ok);
    if(selectedFileNames)return[...ok,...err.filter(r=>selectedFileNames.has(r.name))];
    return[...ok,...err];
  },[results,invF,tipoMap,selectedFileNames]);

  const invFiltrosActivos=invF.tipo!=='todos'||invF.mes!=='todos'||invF.contribuyente!=='todos'||invF.orden!=='default';

  const addTaggedFiles=(tagged,skip=[])=>{
    if(skip.length)setSkipped(p=>[...p,...skip]);
    if(!tagged.length)return;
    const existing=new Set(filesRef.current.map(f=>f.name));
    const dn=tagged.filter(({file:f})=>existing.has(f.name)).map(({file:f})=>f.name);
    if(dn.length)setDupes(d=>[...new Set([...d,...dn])]);
    const nx=tagged.filter(({file:f})=>!existing.has(f.name));
    if(nx.length)setFiles(p=>[...p,...nx.map(({file:f,carpeta:c})=>({id:uid(),file:f,name:f.name,status:'pending',carpeta:c||null}))]);
  };
  const onFileInput=async e=>{
    const all=[...e.target.files];e.target.value='';
    if(all.length>0){const f=all[0];setLastUploadInfo({type:isZip(f)?'zip':'xml',name:all.length===1?f.name:`${all.length} archivos XML`});}
    const tagged=[];const skip=[];
    for(const f of all){
      if(f.name.toLowerCase().endsWith('.xml')){tagged.push({file:f,carpeta:null});}
      else if(isZip(f)){const r=await extractZip(f);tagged.push(...r.xmls.map(x=>({file:x,carpeta:f.name})));skip.push(...r.skip);}
      else skip.push({name:f.name,source:'sel.'});
    }
    addTaggedFiles(tagged,skip);
  };
  const onFolderInput=async e=>{
    const all=[...e.target.files];e.target.value='';
    if(all.length>0){const parts=all[0].webkitRelativePath?.split('/')||[];setLastUploadInfo({type:'folder',name:parts.length>1?parts[0]:all[0].name||'Carpeta'});}
    const tagged=[];const skip=[];
    for(const f of all){
      const parts=f.webkitRelativePath?.split('/')||[];
      const carpeta=parts.length>2?parts[1]:parts.length>1?parts[0]:null;
      if(f.name.toLowerCase().endsWith('.xml')){tagged.push({file:f,carpeta});}
      else if(isZip(f)){const r=await extractZip(f);tagged.push(...r.xmls.map(x=>({file:x,carpeta})));skip.push(...r.skip);}
      else skip.push({name:f.name,source:'carpeta'});
    }
    addTaggedFiles(tagged,skip);
  };

  const process=async()=>{
    if(!pending.length||isActive)return;
    setBusy(true);setProg({c:0,t:pending.length});
    const nr=[];
    const tf=tipoSubida!=='ambas'?tipoSubida:null;
    for(let i=0;i<pending.length;i++){
      const fe=pending[i];
      setFiles(p=>p.map(f=>f.id===fe.id?{...f,status:'processing'}:f));
      setProg({c:i+1,t:pending.length});
      try{const txt=await fe.file.text();const d=parseCFDI(txt);nr.push({name:fe.name,data:d,tipoForzado:tf});setFiles(p=>p.map(f=>f.id===fe.id?{...f,status:d.ok?'success':'error'}:f));}
      catch(err){nr.push({name:fe.name,data:{ok:false,err:[err.message],adv:[],comp:{},fiscal:{},concs:[]},tipoForzado:tf});setFiles(p=>p.map(f=>f.id===fe.id?{...f,status:'error'}:f));}
    }
    setResults(prev=>{
      const existingUuids=new Set(prev.filter(r=>r.data.ok).map(r=>r.data.comp?.uuid).filter(Boolean));
      const seenInBatch=new Set();
      const dupeUuids=new Set();
      const dedupedNr=nr.filter(r=>{
        if(!r.data.ok)return true;
        const uuid=r.data.comp?.uuid;
        if(!uuid)return true;
        if(existingUuids.has(uuid)||seenInBatch.has(uuid)){dupeUuids.add(uuid);return false;}
        seenInBatch.add(uuid);
        return true;
      });
      if(dupeUuids.size>0)setUuidDupes(d=>new Set([...d,...dupeUuids]));
      return[...prev,...dedupedNr];
    });
    setBusy(false);
  };

  useEffect(()=>{if(pending.length>0&&!isActive)process();},[pending.length,isActive]);

  const removeUuidDupes=()=>{
    const seen=new Set();
    setResults(p=>p.filter(r=>{
      if(!r.data.ok)return true;
      const uuid=r.data.comp?.uuid;
      if(!uuid){return true;}
      if(seen.has(uuid))return false;
      seen.add(uuid);return true;
    }));
    setUuidDupes(new Set());
  };

  const guardarContrib=()=>{
    if(!xf.miRfc)return;
    const fromXml=allContribs.find(x=>x.rfc===xf.miRfc);
    const fromSaved=savedContribs[xf.miRfc];
    const nombre=fromXml?.nom||fromSaved?.nombre||xf.miRfc;
    const fileMap=new Map(files.map(f=>[f.name,f.carpeta]));
    const carpetasMap={};
    results.filter(r=>r.data.ok).forEach(r=>{
      const cp=fileMap.get(r.name)||'Sin carpeta';
      if(!carpetasMap[cp])carpetasMap[cp]=[];
      carpetasMap[cp].push({nombre:r.name,uuid:r.data.comp?.uuid||'',fecha:r.data.comp?.fecha||'',total:r.data.fiscal?.total||0});
    });
    const saved={rfc:xf.miRfc,nombre,carpetas:Object.entries(carpetasMap).map(([nombre,xmls])=>({nombre,xmls})),guardadoEn:new Date().toISOString()};
    const updated={...savedContribs,[xf.miRfc]:saved};
    localStorage.setItem(CONTRIB_KEY,JSON.stringify(updated));
    setSavedContribs(updated);
    setExpandedContrib(xf.miRfc);
    setSecContrib(true);
    setSavedMsg(true);setTimeout(()=>setSavedMsg(false),2500);
  };

  const updateEfirma=(rfc,fecha)=>{
    const updated={...savedContribs,[rfc]:{...savedContribs[rfc],efirmaVencimiento:fecha}};
    localStorage.setItem(CONTRIB_KEY,JSON.stringify(updated));
    setSavedContribs(updated);
  };

  const doDelete=useCallback(()=>{
    if(!confirmDel)return;
    if(confirmDel.type==='folder'){
      const cp=confirmDel.carpeta;
      setFiles(p=>p.filter(f=>f.carpeta!==cp));
      setSbFolderNames(prev=>{const n={...prev};delete n[cp];return n;});
      setSbOpenFolders(s=>{const n=new Set(s);n.delete(cp);return n;});
    }else if(confirmDel.type==='file'){
      setFiles(p=>p.filter(f=>f.id!==confirmDel.fileId));
    }
    setConfirmDel(null);
  },[confirmDel]);

  /* ─── Export helpers ─── */
  const getExportName=()=>{
    const contrib=xf.miRfc?allContribs.find(x=>x.rfc===xf.miRfc):null;
    const safe=contrib?contrib.nom.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'_').slice(0,40):'reporte-sat';
    const dates=filteredRows.map(r=>r.fecha).filter(Boolean).sort();
    const desde=dates.length?dates[0].slice(0,10):new Date().toISOString().slice(0,10);
    const hasta=dates.length?dates[dates.length-1].slice(0,10):desde;
    return`${safe}_${desde}_${hasta}`;
  };

  const XL_S={
    hdr: {fill:{fgColor:{rgb:'E2EFDA'}},font:{bold:true,color:{rgb:'1F3D0C'},sz:10},border:{bottom:{style:'thin',color:{rgb:'2F75B6'}}}},
    hdrN:{fill:{fgColor:{rgb:'E2EFDA'}},font:{bold:true,color:{rgb:'1F3D0C'},sz:10},border:{bottom:{style:'thin',color:{rgb:'2F75B6'}}},alignment:{horizontal:'right'}},
    hdrR:{fill:{fgColor:{rgb:'E2EFDA'}},font:{bold:true,color:{rgb:'1F3D0C'},sz:10},border:{bottom:{style:'thin',color:{rgb:'2F75B6'}}},alignment:{horizontal:'center'}},
    mhdr:{fill:{fgColor:{rgb:'BDD7EE'}},font:{bold:true,color:{rgb:'1F3864'},sz:9},border:{top:{style:'medium',color:{rgb:'2F75B6'}}}},
    secI:{fill:{fgColor:{rgb:'E2EFDA'}},font:{bold:true,color:{rgb:'14532D'},sz:10}},
    secE:{fill:{fgColor:{rgb:'FCE4D6'}},font:{bold:true,color:{rgb:'7C2D12'},sz:10}},
    mtot:{fill:{fgColor:{rgb:'FFF2CC'}},font:{bold:true,sz:10},border:{top:{style:'thin',color:{rgb:'000000'}}}},
    mtotN:{fill:{fgColor:{rgb:'FFF2CC'}},font:{bold:true,sz:10},border:{top:{style:'thin',color:{rgb:'000000'}}},alignment:{horizontal:'right'}},
    gtot:{fill:{fgColor:{rgb:'FCE4D6'}},font:{bold:true,sz:10},border:{top:{style:'medium',color:{rgb:'000000'}}}},
    gtotN:{fill:{fgColor:{rgb:'FCE4D6'}},font:{bold:true,sz:10},border:{top:{style:'medium',color:{rgb:'000000'}}},alignment:{horizontal:'right'}},
    even:{fill:{fgColor:{rgb:'FFFFFF'}},font:{sz:10}},
    evenN:{fill:{fgColor:{rgb:'FFFFFF'}},font:{sz:10},alignment:{horizontal:'right'}},
    odd:{fill:{fgColor:{rgb:'F7F7F7'}},font:{sz:10}},
    oddN:{fill:{fgColor:{rgb:'F7F7F7'}},font:{sz:10},alignment:{horizontal:'right'}},
    rn:{fill:{fgColor:{rgb:'F2F2F2'}},font:{color:{rgb:'777777'},sz:9},alignment:{horizontal:'center'}},
  };

  const applyXlStyles=(ws,rowMeta)=>{
    const nc=visCols.length;
    const firstSumIdx=visCols.findIndex(c=>c.numeric&&!c.noSum);
    const merges=[];
    rowMeta.forEach((type,ri)=>{
      for(let ci=0;ci<nc;ci++){
        const addr=XLSX.utils.encode_cell({r:ri,c:ci});
        if(!ws[addr])ws[addr]={v:'',t:'s'};
        const isN=visCols[ci]?.numeric;
        if(type==='hdr')ws[addr].s=isN?XL_S.hdrN:XL_S.hdr;
        else if(type==='mhdr')ws[addr].s=XL_S.mhdr;
        else if(type==='secI')ws[addr].s=XL_S.secI;
        else if(type==='secE')ws[addr].s=XL_S.secE;
        else if(type==='mtot')ws[addr].s=isN?XL_S.mtotN:XL_S.mtot;
        else if(type==='gtot')ws[addr].s=isN?XL_S.gtotN:XL_S.gtot;
        else if(type==='even')ws[addr].s=isN?XL_S.evenN:XL_S.even;
        else if(type==='odd')ws[addr].s=isN?XL_S.oddN:XL_S.odd;
      }
      if(type==='mhdr'||type==='secI'||type==='secE'){
        if(nc>1)merges.push({s:{r:ri,c:0},e:{r:ri,c:nc-1}});
      }else if(type==='mtot'||type==='gtot'){
        if(nc>1)merges.push({s:{r:ri,c:0},e:{r:ri,c:1}});
      }
    });
    if(merges.length)ws['!merges']=merges;
    ws['!cols']=visCols.map(c=>({wch:Math.max(c.label.length+2,c.numeric?14:c.key==='descripcion'||c.key==='nom_em'||c.key==='nom_re'?32:c.key==='uuid'?38:18)}));
  };

  const buildStyledSheet=(rows,wm)=>{
    const aoa=[],meta=[];
    const fv=(c,v)=>c.numeric?(v||0):(c.key==='fecha'||c.key==='fecha_tim'?v?.slice(0,10)||'':v||'');
    const hdrRow=()=>{aoa.push(visCols.map(c=>c.label));meta.push('hdr');};
    const addR=(r,t)=>{aoa.push(visCols.map(c=>fv(c,r[c.key])));meta.push(t);};
    const addT=(rs,lbl,t)=>{const s=sumN(rs,visCols.filter(c=>c.numeric));aoa.push(visCols.map(c=>{if(!c.numeric)return c===visCols[0]?lbl:'';if(c.noSum)return'';return s[c.key]||0;}));meta.push(t);};
    const blank=()=>{aoa.push(Array(visCols.length).fill(''));meta.push('blank');};
    hdrRow();
    if(wm){
      const map=new Map();rows.forEach(r=>{const k=monthKey(r.fecha);if(!map.has(k))map.set(k,[]);map.get(k).push(r);});
      const sorted=[...map.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
      sorted.forEach(([k,mr])=>{
        aoa.push([monthLabel(k).toUpperCase(),...Array(visCols.length-1).fill('')]);meta.push('mhdr');
        hdrRow();
        mr.forEach((r,i)=>addR(r,i%2===0?'even':'odd'));
        addT(mr,`Total ${monthLabel(k)}`,'mtot');blank();blank();
      });
      if(sorted.length>1)addT(rows,'TOTAL GENERAL','gtot');
    }else{
      rows.forEach((r,i)=>addR(r,i%2===0?'even':'odd'));
      addT(rows,'TOTAL GENERAL','gtot');
    }
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    applyXlStyles(ws,meta);
    return ws;
  };

  const buildMismaSheet=(sr,wm)=>{
    const aoa=[],meta=[];
    const fv=(c,v)=>c.numeric?(v||0):(c.key==='fecha'||c.key==='fecha_tim'?v?.slice(0,10)||'':v||'');
    const hdrRow=()=>{aoa.push(visCols.map(c=>c.label));meta.push('hdr');};
    const addT=(rs,lbl,t)=>{const s=sumN(rs,visCols.filter(c=>c.numeric));aoa.push(visCols.map(c=>{if(!c.numeric)return c===visCols[0]?lbl:'';if(c.noSum)return'';return s[c.key]||0;}));meta.push(t);};
    const addSection=(rows,secLabel,stype)=>{
      if(!rows.length)return;
      aoa.push([secLabel,...Array(visCols.length-1).fill('')]);meta.push(stype);
      hdrRow();
      rows.forEach((r,i)=>{aoa.push(visCols.map(c=>fv(c,r[c.key])));meta.push(i%2===0?'even':'odd');});
      addT(rows,'TOTAL','gtot');
      aoa.push(Array(visCols.length).fill(''));meta.push('blank');
      aoa.push(Array(visCols.length).fill(''));meta.push('blank');
    };
    hdrRow();
    addSection(sr.filter(r=>r._tipo==='I'),'▶ INGRESOS','secI');
    addSection(sr.filter(r=>r._tipo==='E'),'▶ GASTOS / EGRESOS','secE');
    const rest=sr.filter(r=>!['I','E'].includes(r._tipo));
    if(rest.length)rest.forEach((r,i)=>{aoa.push(visCols.map(c=>fv(c,r[c.key])));meta.push(i%2===0?'even':'odd');});
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    applyXlStyles(ws,meta);
    return ws;
  };

  /* ─── Excel export ─── */
  const addYearSheets=(wb,rows,prefix)=>{
    const yrMap=new Map();
    rows.forEach(r=>{const yr=r.fecha?r.fecha.slice(0,4):'????';if(!yrMap.has(yr))yrMap.set(yr,[]);yrMap.get(yr).push(r);});
    [...yrMap.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([yr,yrows])=>{
      const name=`${prefix} ${yr}`.slice(0,31);
      XLSX.utils.book_append_sheet(wb,buildStyledSheet(yrows,true),name);
    });
  };
  const exportExcel=()=>{
    const fn=getExportName();
    let sr=[...filteredRows];
    if(xf.ordenFecha==='asc')sr.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(xf.ordenFecha==='desc')sr.sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const wm=xf.sumasMensuales;
    if(xf.sepPorAno){
      const wb=XLSX.utils.book_new();
      const yrsSet=new Set(sr.map(r=>r.fecha?r.fecha.slice(0,4):'????'));
      const yrs=[...yrsSet].sort();
      yrs.forEach(yr=>{
        const byYr=sr.filter(r=>(r.fecha?r.fecha.slice(0,4):'????')===yr);
        const ing=byYr.filter(r=>r._tipo==='I');
        const egr=byYr.filter(r=>r._tipo==='E');
        if(ing.length){const nm=`INGRESOS ${yr}`.slice(0,31);XLSX.utils.book_append_sheet(wb,buildStyledSheet(ing,wm),nm);}
        if(egr.length){const nm=`GASTOS ${yr}`.slice(0,31);XLSX.utils.book_append_sheet(wb,buildStyledSheet(egr,wm),nm);}
      });

      return;
    }
    if(xf.separar&&xf.sepModo==='dos-archivos'){
      [['Ingresos',sr.filter(r=>r._tipo==='I')],['Gastos',sr.filter(r=>r._tipo==='E')]].forEach(([n,rows])=>{
        const wb=XLSX.utils.book_new();

    const wb=XLSX.utils.book_new();

    }else if(xf.separar&&xf.sepModo==='misma'){
      XLSX.utils.book_append_sheet(wb,buildMismaSheet(sr,wm),'Reporte SAT');
    }else{
      if(wm)addYearSheets(wb,sr,'Año');
      else XLSX.utils.book_append_sheet(wb,buildStyledSheet(sr,false),'Reporte SAT');
    }
    XLSX.writeFile(wb,`${fn}.xlsx`);
  };

  /* ─── PDF export ─── */
  const exportPDF=()=>{
    const {jsPDF}=window.jspdf;
    const dt=new Date().toISOString().slice(0,10);
    let sr=[...filteredRows];
    if(xf.ordenFecha==='asc')sr.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(xf.ordenFecha==='desc')sr.sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const buildPDFData=(rows)=>{
      const headers=['#',...visCols.map(c=>c.label)];
      const body=rows.map((r,i)=>[i+1,...visCols.map(c=>{
        if(c.numeric)return c.currency===false?numFmt(r[c.key]||0):peso(r[c.key]||0);
        if(c.key==='fecha'||c.key==='fecha_tim')return r[c.key]?.slice(0,10)||'';
        if(c.key==='tipo_cfdi')return tipoLabel(r[c.key]);
        if(c.key==='uuid')return r[c.key]?.slice(0,18)||'';
        return r[c.key]||'';
      })]);
      const totals=sumN(rows,visCols.filter(c=>c.numeric));
      body.push(['TOTAL',...visCols.map(c=>c.numeric?(c.currency===false?numFmt(totals[c.key]||0):peso(totals[c.key]||0)):'')]);
      return{headers,body};
    };
    const makeDoc=()=>new jsPDF({orientation:'landscape',unit:'pt',format:'a3'});
    const tableOpts=(headers,body,title)=>({
      head:[headers],body,
      styles:{fontSize:6,cellPadding:2,overflow:'ellipsize'},
      headStyles:{fillColor:[31,40,46],textColor:255,fontStyle:'bold',fontSize:6.5},
      alternateRowStyles:{fillColor:[247,247,247]},
      didDrawPage:(d)=>{
        const doc=d.doc;

        doc.autoTable({...tableOpts(headers,body,label),startY:y});
        y=doc.lastAutoTable.finalY+20;
      };

      const{headers,body}=buildPDFData(sr);

  const selStyle={padding:'5px 9px',borderRadius:5,border:'1px solid var(--b2)',background:'var(--card)',color:'var(--t1)',fontSize:11,cursor:'pointer'};

  /* ══ RENDER ══ */

    <div style={{minHeight:'100vh',background:'var(--bg)'}}>

      {/* HEADER */}

        <div style={{maxWidth:1440,margin:'0 auto',padding:'0 18px',height:54,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h1 className="sr-only">SAT CFDI Processor</h1>
          <button onClick={()=>setPage('home')} style={{display:'flex',alignItems:'center',gap:10,background:'none',border:'none',cursor:'pointer',padding:0,fontFamily:'Inter,sans-serif'}}>
            <div style={{width:32,height:32,background:'#1a1d23',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.2" fill="#fff" opacity=".85"/><rect x="9" y="1" width="6" height="6" rx="1.2" fill="#fff" opacity=".45"/><rect x="1" y="9" width="6" height="6" rx="1.2" fill="#fff" opacity=".45"/><rect x="9" y="9" width="6" height="6" rx="1.2" fill="#fff" opacity=".75"/></svg>
            </div>
            <div style={{textAlign:'left'}}>
              <p style={{fontWeight:700,fontSize:13,margin:0,color:'var(--t1)'}}>SAT CFDI Processor</p>
              <p style={{fontSize:10,color:'var(--t3)',margin:0}}>CFDI 3.3/4.0 · Local · Sin API</p>
            </div>
          </button>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            {results.length>0&&<button className="btn btn-sm" onClick={clearAll}>↺ Limpiar</button>}
            {user&&(()=>{
              const name=user.user_metadata?.full_name||user.user_metadata?.name||user.email?.split('@')[0]||'';
              const av=user.user_metadata?.avatar_url;
              return(
                <div style={{display:'flex',alignItems:'center',gap:6,padding:'3px 8px 3px 4px',borderRadius:20,background:'var(--raised)',border:'1px solid var(--b1)'}}>
                  {av?<img src={av} alt="" style={{width:22,height:22,borderRadius:'50%'}}/>:<div style={{width:22,height:22,borderRadius:'50%',background:'#16a34a',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:700}}>{name[0]?.toUpperCase()}</div>}
                  <span style={{fontSize:11,color:'var(--t2)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
                  <button onClick={handleSignOut} style={{fontSize:10,color:'var(--t3)',background:'none',border:'none',cursor:'pointer',padding:'0 2px',fontFamily:'Inter,sans-serif'}} title="Cerrar sesión">×</button>
                </div>

            </div>

                <div ref={dropRef} className={'sb-drop-zone'+(drag?' sb-dragover':'')} onClick={function(){document.getElementById('sb-all')&&document.getElementById('sb-all').click();}}>

                                  React.createElement('path',{d:'M10 11v6'}),
                                  React.createElement('path',{d:'M14 11v6'})
                                )
                              )
                            );
                          })
                        )
                      );

        <p style={{fontSize:10,color:'var(--t3)'}}>SAT CFDI Processor · 100% local · Sin internet · Sin API</p>
      </footer>

      {sepModal&&<SepModal onClose={()=>setSepModal(false)} onSelect={m=>{upXf({separar:true,sepModo:m});setSepModal(false);}} cur={xf.sepModo}/>}
      {saveBeforeExportModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setSaveBeforeExportModal(false)}>
          <div style={{background:'var(--card)',borderRadius:12,padding:'24px 22px',maxWidth:340,width:'90%',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}} onClick={e=>e.stopPropagation()}>
            <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:6}}>¿Guardar antes de exportar?</p>
            <p style={{fontSize:12,color:'var(--t2)',marginBottom:20,lineHeight:1.65}}>Los archivos de <strong>{xf.miRfc}</strong> aún no están guardados.<br/>¿Deseas guardarlos antes de descargar el Excel?</p>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <button onClick={()=>{guardarContrib();exportExcel();setSaveBeforeExportModal(false);}} style={{padding:'9px',borderRadius:8,background:'#f59e0b',border:'1px solid #d97706',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                📁 Guardar archivos y exportar
              </button>
              <button onClick={()=>{exportExcel();setSaveBeforeExportModal(false);}} style={{padding:'9px',borderRadius:8,background:'#1a1d23',border:'none',color:'#fff',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
                ⬇ Solo exportar (sin guardar)
              </button>
              <button onClick={()=>setSaveBeforeExportModal(false)} style={{padding:'9px',borderRadius:8,background:'transparent',border:'1px solid var(--b1)',color:'var(--t2)',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
                Cancelar
              </button>
            </div>
          </div>
        </div>
      )}
      {confirmDel&&<ConfirmModal
        title={confirmDel.type==='folder'?`¿Eliminar carpeta "${confirmDel.displayName}"?`:`¿Eliminar "${confirmDel.fileName}"?`}
        msg={confirmDel.type==='folder'?'Se quitarán de la sesión todos sus archivos XML. No se eliminan del disco.':'El archivo se quitará de la sesión. No se elimina del disco.'}
        onConfirm={doDelete}
        onCancel={()=>setConfirmDel(null)}
      />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
